
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Study Dashboard</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--text:#222;--primary:#1f4aa8}
body.dark{--bg:#121212;--card:#1f1f1f;--text:#eee;--primary:#5b8dff}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--primary);color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.card{background:var(--card);margin:18px;padding:18px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
a{text-decoration:none;color:var(--primary);font-weight:bold}
button,input,select{padding:8px;margin:4px}
#timer,#pomodoro{font-size:42px;font-weight:bold}
.progress{width:100%;height:24px;background:#ccc;border-radius:12px;overflow:hidden}
#bar{height:100%;width:0;background:#3cb371}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #aaa;padding:8px;text-align:center}
canvas{max-width:100%}
footer{text-align:center;padding:15px;font-weight:bold}
</style>
</head>
<body>
<header>
<h2>📚 Study Dashboard</h2>
<div id="dt"></div>
</header>

<div class="card">
<button onclick="toggleMode()">🌙 Dark Mode</button>
</div>

<div class="card">
<h3>Quick Links</h3>
<div class="grid">
<a href="https://google.com" target="_blank">Google</a>
<a href="https://youtube.com" target="_blank">YouTube</a>
<a href="https://pw.live" target="_blank">PW</a>
<a href="https://meet.google.com/landing" target="_blank">Meet</a>
<a href="https://wikipedia.org" target="_blank">Wikipedia</a>
</div>
</div>

<div class="card">
<h3>Study Timer</h3>

<label><b>Daily Goal (Hours):</b></label>
<input type="number" id="goalInput" min="1" max="24">
<button onclick="saveGoal()">Save Goal</button>
<p id="goalInfo"></p>

<div id="timer">00:00:00</div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<div class="progress"><div id="bar"></div></div>
<p id="progressText"></p>
</div>

<div class="card">
<h3>🍅 Pomodoro</h3>
<select id="mode">
<option value="1500">25 / 5</option>
<option value="3000">50 / 10</option>
</select>
<div id="pomodoro">25:00</div>
<button onclick="startPom()">Start</button>
<button onclick="stopPom()">Stop</button>
<button onclick="resetPom()">Reset</button>
</div>

<div class="card"><h3>📅 Monthly Study Records</h3><div id="calendar"></div></div>
<div class="card"><h3>📈 Weekly Study Chart</h3><canvas id="chart" width="700" height="250"></canvas></div>
<div class="card"><h3>Last 7 Days</h3><table><thead><tr><th>Date</th><th>Study Time</th></tr></thead><tbody id="history"></tbody></table></div>

<footer>Developed By Rastogi Ji</footer>

<script>
function updateDT(){const n=new Date(),d=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];dt.innerHTML=d[n.getDay()]+"<br>"+n.toLocaleDateString()+"<br>"+n.toLocaleTimeString();}
setInterval(updateDT,1000);updateDT();

let today=new Date().toISOString().slice(0,10);
let secs=0,timerInt=null;
let current=JSON.parse(localStorage.getItem("studyCurrent")||"{}");
if(current.date===today)secs=current.seconds||0;

let goal=parseFloat(localStorage.getItem("dailyGoalHours"))||8;
goalInput.value=goal;

function fmt(s){let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return[h,m,ss].map(v=>String(v).padStart(2,"0")).join(":")}
function render(){timer.textContent=fmt(secs);updateProgress();}
function saveCurrent(){localStorage.setItem("studyCurrent",JSON.stringify({date:today,seconds:secs}));saveHistory();}
function saveGoal(){goal=parseFloat(goalInput.value)||8;localStorage.setItem("dailyGoalHours",goal);updateProgress();}
function updateProgress(){
 goalInfo.textContent="Daily Goal: "+goal+" hour(s)";
 let p=Math.min(secs/(goal*3600)*100,100);
 bar.style.width=p+"%";
 progressText.textContent=p.toFixed(1)+"% Complete ("+fmt(secs)+" / "+goal+"h)";
}
function start(){if(timerInt)return;timerInt=setInterval(()=>{secs++;render();saveCurrent();},1000)}
function stop(){clearInterval(timerInt);timerInt=null;saveCurrent();}
function resetTimer(){stop();secs=0;render();saveCurrent();}

function saveHistory(){
 let h=JSON.parse(localStorage.getItem("studyHistory")||"{}");
 h[today]=secs;
 let k=Object.keys(h).sort();
 while(k.length>7){delete h[k.shift()]}
 localStorage.setItem("studyHistory",JSON.stringify(h));
 loadHistory();drawChart();drawCalendar();
}
function loadHistory(){
 let h=JSON.parse(localStorage.getItem("studyHistory")||"{}"),rows="";
 Object.keys(h).sort().reverse().forEach(d=>rows+=`<tr><td>${d}</td><td>${fmt(h[d])}</td></tr>`);
 history.innerHTML=rows;
}
function drawCalendar(){
 let h=JSON.parse(localStorage.getItem("studyHistory")||"{}"),t="<table><tr><th>Date</th><th>Hours</th></tr>";
 Object.keys(h).sort().forEach(d=>t+=`<tr><td>${d}</td><td>${(h[d]/3600).toFixed(2)}</td></tr>`);
 calendar.innerHTML=t+"</table>";
}
function drawChart(){
 let ctx=chart.getContext("2d");ctx.clearRect(0,0,700,250);
 let h=JSON.parse(localStorage.getItem("studyHistory")||"{}");
 let keys=Object.keys(h).sort(); if(!keys.length)return;
 let max=Math.max(...keys.map(k=>h[k]),1);
 keys.forEach((k,i)=>{let x=60+i*85,b=(h[k]/max)*150;ctx.fillStyle="#4f8cff";ctx.fillRect(x,200-b,40,b);ctx.fillStyle="#000";ctx.fillText((h[k]/3600).toFixed(1)+"h",x-3,195-b);ctx.fillText(k.slice(5),x-8,220);});
}

let pomSec=1500,pInt=null;
function showPom(){pomodoro.textContent=String(Math.floor(pomSec/60)).padStart(2,"0")+":"+String(pomSec%60).padStart(2,"0")}
mode.onchange=()=>{resetPom()}
function startPom(){if(pInt)return;pInt=setInterval(()=>{if(pomSec>0){pomSec--;showPom()}else{alert("Pomodoro session completed!");stopPom();}},1000)}
function stopPom(){clearInterval(pInt);pInt=null}
function resetPom(){stopPom();pomSec=parseInt(mode.value);showPom()}
showPom();

function toggleMode(){document.body.classList.toggle("dark")}
render();loadHistory();drawCalendar();drawChart();
</script>
</body></html>
