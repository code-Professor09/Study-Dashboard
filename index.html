
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Study Dashboard</title>
<style>
:root{--bg:#eef2f7;--card:#fff;--text:#222;--primary:#1f4aa8}
body.dark{--bg:#121212;--card:#1f1f1f;--text:#eee;--primary:#5b8dff}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:var(--primary);color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.card{background:var(--card);margin:18px;padding:18px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
a{text-decoration:none;color:var(--primary);font-weight:bold}
button,input,select{padding:8px;margin:4px}
#timer,#pomodoro{font-size:42px;font-weight:bold}
.progress{width:100%;height:24px;background:#ccc;border-radius:12px;overflow:hidden}
#bar{height:100%;width:0;background:#3cb371}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #aaa;padding:8px;text-align:center}
canvas{max-width:100%}
footer{text-align:center;padding:15px;font-weight:bold}

.todo-input{display:flex;gap:10px;margin-bottom:10px}
.todo-input input{flex:1;padding:8px}
.todo-item{display:flex;justify-content:space-between;align-items:center;padding:8px;margin:6px 0;background:#f2f2f2;border-radius:6px}
body.dark .todo-item{background:#333}
.todo-item.done span{text-decoration:line-through;color:green}
.deleteBtn{background:#d33;color:#fff;border:none;padding:4px 8px;border-radius:4px}

</style>
</head>
<body>
<header>
<h2>📚 Study Dashboard</h2>
<div id="dt"></div>
</header>

<div class="card">
<button onclick="toggleMode()">🌙 Dark Mode</button>
</div>

<div class="card">
<h3>Quick Links</h3>
<div class="grid">
<a href="https://google.com" target="_blank">Google</a>
<a href="https://youtube.com" target="_blank">YouTube</a>
<a href="https://pw.live" target="_blank">PW</a>
<a href="https://meet.google.com/landing" target="_blank">Meet</a>
<a href="https://wikipedia.org" target="_blank">Wikipedia</a>
</div>
</div>

<div class="card">
<h3>Study Timer</h3>

<label><b>Daily Goal (Hours):</b></label>
<input type="number" id="goalInput" min="1" max="24">
<button onclick="saveGoal()">Save Goal</button>
<p id="goalInfo"></p>

<div id="timer">00:00:00</div>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<div class="progress"><div id="bar"></div></div>
<p id="progressText"></p>
</div>


<div class="card">
<h3>📋 Study Tasks</h3>

<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">

<button id="prevDay">⬅</button>

<input type="date" id="taskDate">

<button id="nextDay">➡</button>

<button id="todayBtn">Today</button>

</div>
<div class="todo-input">
<input id="taskInput" placeholder="Enter task">
<button id="addTaskBtn">Add</button>
</div>
<div id="todoList"></div>
</div>

<div class="card">
<h3>🍅 Pomodoro</h3>
<select id="mode">
<option value="1500">25 / 5</option>
<option value="3000">50 / 10</option>
</select>
<div id="pomodoro">25:00</div>
<button onclick="startPom()">Start</button>
<button onclick="stopPom()">Stop</button>
<button onclick="resetPom()">Reset</button>
</div>

<div class="card"><h3>📅 Monthly Study Records</h3><div id="calendar"></div></div>
<div class="card"><h3>📈 Weekly Study Chart</h3><canvas id="chart" width="700" height="250"></canvas></div>
<div class="card"><h3>Last 7 Days</h3><table><thead><tr><th>Date</th><th>Study Time</th></tr></thead><tbody id="history"></tbody></table></div>

<footer>Developed By Rastogi Ji</footer>

<script>
function updateDT(){const n=new Date(),d=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];dt.innerHTML=d[n.getDay()]+"<br>"+n.toLocaleDateString()+"<br>"+n.toLocaleTimeString();}
setInterval(updateDT,1000);updateDT();
let today=new Date().toISOString().slice(0,10);
let timerInt=null;
let current=JSON.parse(localStorage.getItem("studyCurrent")||"{}");
if(current.date!==today){current={date:today,elapsed:0,running:false,startTime:null};}
let goal=parseFloat(localStorage.getItem("dailyGoalHours"))||8;goalInput.value=goal;
function fmt(s){let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return[h,m,ss].map(v=>String(v).padStart(2,"0")).join(":")}
function elapsed(){return current.running?current.elapsed+Math.floor((Date.now()-current.startTime)/1000):current.elapsed;}
function persist(){localStorage.setItem("studyCurrent",JSON.stringify(current));}
function render(){let s=elapsed();timer.textContent=fmt(s);goalInfo.textContent="Daily Goal: "+goal+" hour(s)";let p=Math.min(s/(goal*3600)*100,100);bar.style.width=p+"%";progressText.textContent=p.toFixed(1)+"% Complete ("+fmt(s)+" / "+goal+"h)";}
function saveGoal(){goal=parseFloat(goalInput.value)||8;localStorage.setItem("dailyGoalHours",goal);render();}
function start(){if(current.running)return;current.running=true;current.startTime=Date.now();persist();clearInterval(timerInt);timerInt=setInterval(render,250);}
function stop(){if(!current.running)return;current.elapsed=elapsed();current.running=false;current.startTime=null;persist();saveHistory();clearInterval(timerInt);render();}
function resetTimer(){clearInterval(timerInt);current={date:today,elapsed:0,running:false,startTime:null};persist();saveHistory();render();}
function saveHistory(){let h=JSON.parse(localStorage.getItem("studyHistory")||"{}");h[today]=elapsed();let k=Object.keys(h).sort();while(k.length>7)delete h[k.shift()];localStorage.setItem("studyHistory",JSON.stringify(h));loadHistory();drawChart();drawCalendar();}
function loadHistory(){let h=JSON.parse(localStorage.getItem("studyHistory")||"{}"),rows="";Object.keys(h).sort().reverse().forEach(d=>rows+=`<tr><td>${d}</td><td>${fmt(h[d])}</td></tr>`);history.innerHTML=rows;}
function drawCalendar(){let h=JSON.parse(localStorage.getItem("studyHistory")||"{}"),t="<table><tr><th>Date</th><th>Hours</th></tr>";Object.keys(h).sort().forEach(d=>t+=`<tr><td>${d}</td><td>${(h[d]/3600).toFixed(2)}</td></tr>`);calendar.innerHTML=t+"</table>";}
function drawChart(){let ctx=chart.getContext("2d");ctx.clearRect(0,0,700,250);let h=JSON.parse(localStorage.getItem("studyHistory")||"{}");let keys=Object.keys(h).sort();if(!keys.length)return;let max=Math.max(...keys.map(k=>h[k]),1);keys.forEach((k,i)=>{let x=60+i*85,b=(h[k]/max)*150;ctx.fillStyle="#4f8cff";ctx.fillRect(x,200-b,40,b);ctx.fillStyle="#000";ctx.fillText((h[k]/3600).toFixed(1)+"h",x-3,195-b);ctx.fillText(k.slice(5),x-8,220);});}
window.addEventListener("beforeunload",()=>{if(current.running){current.elapsed=elapsed();current.startTime=Date.now();persist();}});
document.addEventListener("visibilitychange",()=>render());
let pomSec=1500,pInt=null;
function showPom(){pomodoro.textContent=String(Math.floor(pomSec/60)).padStart(2,"0")+":"+String(pomSec%60).padStart(2,"0")}
mode.onchange=()=>{resetPom()}
function startPom(){if(pInt)return;pInt=setInterval(()=>{if(pomSec>0){pomSec--;showPom()}else{alert("Pomodoro session completed!");stopPom();}},1000)}
function stopPom(){clearInterval(pInt);pInt=null}
function resetPom(){stopPom();pomSec=parseInt(mode.value);showPom()}
showPom();

function toggleMode(){document.body.classList.toggle("dark")}
if(current.running){timerInt=setInterval(render,250);}render();loadHistory();drawCalendar();drawChart();

// TODO MODULE
let taskDate=today;

document.getElementById("taskDate").value=today;
let studyTasks=JSON.parse(localStorage.getItem('studyTasks')||'{}');
if(!studyTasks[taskDate])studyTasks[taskDate]=[];
function saveTasks(){

    let dates=Object.keys(studyTasks).sort();

    while(dates.length>30){

        delete studyTasks[dates.shift()];

    }

    localStorage.setItem(
        "studyTasks",
        JSON.stringify(studyTasks)
    );

}
function renderTasks(){
    if(!studyTasks[taskDate]){

    studyTasks[taskDate]=[];

}
const list=document.getElementById('todoList'); if(!list)return;
list.innerHTML='';
let done=0;
studyTasks[taskDate].forEach((t,i)=>{
if(t.done)done++;
const d=document.createElement('div');
d.className='todo-item'+(t.done?' done':'');
d.innerHTML=`<div><input type="checkbox" ${t.done?'checked':''}> <span>${t.text}</span></div><button class="deleteBtn">🗑</button>`;
d.querySelector('input').onchange=()=>{studyTasks[taskDate][i].done=!studyTasks[taskDate][i].done;saveTasks();renderTasks();};
d.querySelector('button').onclick=()=>{studyTasks[taskDate].splice(i,1);saveTasks();renderTasks();};
list.appendChild(d);
});
}
document.getElementById('addTaskBtn').onclick=()=>{
let v=document.getElementById('taskInput').value.trim();
if(!v)return;
if(!studyTasks[taskDate]){

    studyTasks[taskDate]=[];

}

studyTasks[taskDate].push({

    text:v,

    done:false

});
document.getElementById('taskInput').value='';
saveTasks();renderTasks();
};
renderTasks();
function loadTasks(){

    if(!studyTasks[taskDate]){

        studyTasks[taskDate]=[];

    }

    renderTasks();

}
document.getElementById("taskDate")

.onchange=function(){

    taskDate=this.value;

    loadTasks();

};
document.getElementById("prevDay")

.onclick=function(){

    let d=new Date(taskDate);

    d.setDate(d.getDate()-1);

    taskDate=d.toISOString().slice(0,10);

    document.getElementById("taskDate").value=taskDate;

    loadTasks();

}
document.getElementById("nextDay")

.onclick=function(){

    let d=new Date(taskDate);

    d.setDate(d.getDate()+1);

    taskDate=d.toISOString().slice(0,10);

    document.getElementById("taskDate").value=taskDate;

    loadTasks();
}
document.getElementById("todayBtn")

.onclick=function(){

    taskDate=today;

    document.getElementById("taskDate").value=today;

    loadTasks();
}
</script>
</body></html>
